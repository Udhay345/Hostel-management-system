name: hostel_management_system
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # Firebase packages
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.12
  # QR Scanner - mobile_scanner is more stable across platforms
  mobile_scanner: ^5.0.1
  permission_handler: ^11.3.1
  # PDF export
  pdf: ^3.10.7
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  cross_file: ^0.3.3+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/rit logo.png
    - assets/data/ 